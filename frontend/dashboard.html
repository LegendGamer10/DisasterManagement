<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Disaster Watch</title>
  <meta name="description" content="Review all submitted disaster reports on a heatmap and table." />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Disaster Watch</a>
    <nav class="site-nav" aria-label="Main">
      <a href="index.html">Home</a>
      <a href="report.html">Report</a>
      <a href="dashboard.html" aria-current="page">Dashboard</a>
      <a href="live-map.html">Live Map</a>
    </nav>
  </header>

  <!-- Alert toast container -->
  <div id="toastContainer" style="position:fixed;top:76px;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:0.5rem;max-width:380px;"></div>

  <main class="container">

    <!-- Stats row -->
    <div class="stats-grid fade-in">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total Reports</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-high" style="background:linear-gradient(135deg,#ff3d71,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">0</div>
        <div class="stat-label">High Risk</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-medium" style="background:linear-gradient(135deg,#ffaa00,#f4a261);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">0</div>
        <div class="stat-label">Medium Risk</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-types">—</div>
        <div class="stat-label">Disaster Types</div>
      </div>
    </div>

    <!-- Map card -->
    <div class="card fade-in" style="margin-bottom:1.25rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;margin-bottom:1rem;">
        <h2 style="font-size:1rem;font-weight:700;">📍 Incident Heatmap</h2>
        <div style="display:flex;gap:0.5rem;align-items:center;">
          <button class="btn btn-sm" id="toggleHeatmap" type="button">Toggle Heatmap</button>
          <button class="btn btn-sm" id="refreshBtn" type="button">↻ Refresh</button>
        </div>
      </div>
      <div id="map"></div>
      <div class="heatmap-legend">
        <span>Intensity:</span>
        <div class="legend-gradient"></div>
        <span>Low → High</span>
        <span style="margin-left:auto;color:var(--text-dim);font-size:0.75rem;" id="lastUpdated"></span>
      </div>
    </div>

    <!-- Filter + Table -->
    <div class="card fade-in">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1rem;">
        <h2 style="font-size:1rem;font-weight:700;">📋 Submitted Reports</h2>
        <div class="filter-bar">
          <select id="filterType">
            <option value="">All Types</option>
            <option>Flood</option>
            <option>Wildfire</option>
            <option>Earthquake</option>
            <option>Cyclone</option>
            <option>Landslide</option>
            <option>Drought</option>
            <option>Deforestation</option>
            <option>General Incident</option>
          </select>
          <select id="filterRisk">
            <option value="">All Risk Levels</option>
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
          </select>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Report</th>
              <th>Type</th>
              <th>Risk</th>
              <th>Confidence</th>
              <th>Location</th>
              <th>Source</th>
            </tr>
          </thead>
          <tbody id="reportsTableBody">
            <tr><td colspan="7" class="empty">No reports yet — <a href="report.html">submit one →</a></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="common.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>

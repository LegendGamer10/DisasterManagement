<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Disaster Detection System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>AI-Powered Disaster Detection</h1>

    <section class="card">
      <h2>Analyze New Report</h2>
      <form id="analyzeForm">
        <label for="reportInput">Disaster Report Text</label>
        <textarea id="reportInput" required placeholder="Describe what is happening..."></textarea>
        <button type="submit">Submit</button>
      </form>
    </section>

    <section class="card" id="resultCard" hidden>
      <h2>Analysis Result</h2>
      <p><strong>Disaster Type:</strong> <span id="disasterType">-</span></p>
      <p><strong>Risk Level:</strong> <span id="riskLevel" class="badge">-</span></p>
      <p><strong>Confidence Score:</strong> <span id="confidence">-</span></p>
      <p><strong>AI-generated Summary:</strong> <span id="summary">-</span></p>
      <p id="alertBanner" class="alert" hidden>🚨 Emergency Alert Generated</p>
    </section>

    <section class="card">
      <h2>Previous Reports Dashboard</h2>
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Report</th>
            <th>Type</th>
            <th>Risk</th>
            <th>Confidence</th>
          </tr>
        </thead>
        <tbody id="reportsTableBody">
          <tr><td colspan="5" class="empty">No reports yet.</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

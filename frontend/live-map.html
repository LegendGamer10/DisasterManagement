<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Global Map — Disaster Watch</title>
  <meta name="description" content="Real-time global disaster map powered by NASA EONET and USGS." />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { overflow: hidden; }
    .live-indicator {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--danger);
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--danger); animation: dot-pulse 1.5s infinite;
    }
    .sidebar-stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.5rem; padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
    }
    .mini-stat { text-align: center; }
    .mini-stat-val { font-size: 1.3rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
    .mini-stat-lbl { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .toast-inner {
      padding: 0.8rem 1rem; border-radius: var(--radius-md);
      background: rgba(10,20,40,0.95); backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      font-size: 0.83rem; animation: fadeIn 0.3s ease both;
      pointer-events: auto; cursor: pointer;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Disaster Watch</a>
    <nav class="site-nav" aria-label="Main">
      <a href="index.html">Home</a>
      <a href="report.html">Report</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="live-map.html" aria-current="page">Live Map</a>
    </nav>
  </header>

  <!-- Alert toast container -->
  <div id="toastContainer" style="position:fixed;top:76px;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:0.5rem;max-width:380px;pointer-events:none;"></div>

  <div class="live-map-layout">
    <!-- Sidebar -->
    <aside class="event-sidebar">
      <div class="sidebar-header">
        <h2>🌍 Live Events</h2>
        <span class="live-indicator"><span class="live-dot"></span>Live</span>
      </div>

      <!-- Mini stats -->
      <div class="sidebar-stats">
        <div class="mini-stat">
          <div class="mini-stat-val" id="sb-total" style="color:var(--accent);">—</div>
          <div class="mini-stat-lbl">Events</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stat-val" id="sb-critical" style="color:var(--danger);">—</div>
          <div class="mini-stat-lbl">Critical</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stat-val" id="sb-warning" style="color:var(--warning);">—</div>
          <div class="mini-stat-lbl">Warnings</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stat-val" id="sb-watch" style="color:var(--success);">—</div>
          <div class="mini-stat-lbl">Watch</div>
        </div>
      </div>

      <!-- Filters -->
      <div style="padding:0.75rem 1rem;border-bottom:1px solid var(--glass-border);display:flex;gap:0.5rem;flex-shrink:0;">
        <select id="typeFilter" style="flex:1;padding:0.4rem 0.6rem;font-size:0.8rem;background:var(--bg-card);border:1px solid var(--glass-border);border-radius:var(--radius-sm);color:var(--text-primary);">
          <option value="">All Types</option>
          <option>Wildfire</option>
          <option>Earthquake</option>
          <option>Flood</option>
          <option>Cyclone</option>
          <option>Volcanic Activity</option>
          <option>Seismic Activity</option>
        </select>
        <select id="severityFilter" style="flex:1;padding:0.4rem 0.6rem;font-size:0.8rem;background:var(--bg-card);border:1px solid var(--glass-border);border-radius:var(--radius-sm);color:var(--text-primary);">
          <option value="">All Severity</option>
          <option value="critical">Critical</option>
          <option value="warning">Warning</option>
          <option value="watch">Watch</option>
        </select>
      </div>

      <!-- Event list -->
      <div class="event-list" id="eventList">
        <div style="text-align:center;padding:2rem;color:var(--text-dim);">
          <div class="spinner" style="margin:0 auto 0.75rem;"></div>
          Loading live events…
        </div>
      </div>

      <!-- Refresh info -->
      <div style="padding:0.6rem 1rem;border-top:1px solid var(--glass-border);font-size:0.72rem;color:var(--text-dim);flex-shrink:0;display:flex;justify-content:space-between;">
        <span>Auto-refreshes every 60 s</span>
        <span id="lastRefresh">—</span>
      </div>
    </aside>

    <!-- Map area -->
    <div style="position:relative;">
      <div id="map-fullscreen"></div>

      <!-- Map legend -->
      <div class="map-legend">
        <h4>Event Types</h4>
        <div class="legend-item"><div class="legend-dot" style="background:#ff3d71;"></div>Volcanic</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff6b35;"></div>Wildfire</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ffaa00;"></div>Earthquake</div>
        <div class="legend-item"><div class="legend-dot" style="background:#00d4ff;"></div>Flood</div>
        <div class="legend-item"><div class="legend-dot" style="background:#7b61ff;"></div>Cyclone</div>
        <div class="legend-item"><div class="legend-dot" style="background:#aaaaaa;"></div>Other</div>
      </div>

      <!-- Layer toggle -->
      <div style="position:absolute;top:16px;left:16px;z-index:400;display:flex;gap:0.5rem;">
        <button class="btn btn-sm" id="toggleHeatLayer" style="background:rgba(5,11,24,0.9);backdrop-filter:blur(12px);">🔥 Heatmap</button>
        <button class="btn btn-sm" id="toggleMarkers" style="background:rgba(5,11,24,0.9);backdrop-filter:blur(12px);">📍 Markers</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="common.js"></script>
  <script src="live-map.js"></script>
</body>
</html>
